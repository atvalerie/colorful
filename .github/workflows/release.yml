name: Desktop release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Match tag to VERSION
        run: ./scripts/check-release-version.sh "$GITHUB_REF_NAME"

  linux:
    name: Build Linux packages
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build AppImage and portable archive
        run: ./scripts/package-linux-docker.sh
      - uses: actions/upload-artifact@v4
        with:
          name: colorful-linux-${{ github.ref_name }}
          path: |
            dist/*.AppImage
            dist/*-portable.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  windows:
    name: Build Windows packages
    needs: validate
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install installer compiler
        shell: powershell
        run: choco install innosetup --yes --no-progress
      - name: Install provider dependencies
        shell: powershell
        run: bun install --cwd packages/provider-host --frozen-lockfile
      - name: Provision Qt and media dependencies
        shell: powershell
        run: .\scripts\provision-windows-qt.ps1
      - name: Build portable archive and installer
        shell: powershell
        run: .\scripts\package-windows.ps1 -Installer
      - uses: actions/upload-artifact@v4
        with:
          name: colorful-windows-${{ github.ref_name }}
          path: |
            dist/*-portable.zip
            dist/*-setup.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [linux, windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release-assets/*
          --verify-tag
          --generate-notes
          --title "colorful $(cat VERSION)"
